<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Group Prediction</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e66465, #9198e5);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h2 {
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            font-size: 32px;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 12px 20px;
            cursor: pointer;
            background-color: #4a90e2;
            color: white;
            border-radius: 8px;
            transition: background 0.3s ease;
            margin-bottom: 10px;
        }

        .custom-file-upload:hover {
            background-color: #357ABD;
        }

        #file-name {
            font-size: 15px;
            color: #333;
            margin-bottom: 20px;
            font-style: italic;
            background: #f2f2f2;
            padding: 10px 15px;
            border-radius: 8px;
            display: inline-block;
        }

        .file-icon {
            margin-right: 8px;
        }

        button {
            background-color: #4a90e2;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #357ABD;
        }
    </style>
</head>
<body>
    <h2>Blood Group Detection using Fingerprint</h2>
    <div class="card">
        <h1>Upload Fingerprint Image</h1>
        <form action="/predict" method="post" enctype="multipart/form-data">
            <label for="file-upload" class="custom-file-upload">
                Choose Fingerprint Image
            </label>
            <input id="file-upload" type="file" name="file" accept="image/*" required>
            <p id="file-name"><span class="file-icon">📁</span> No fingerprint selected</p>
            <button type="submit">Predict Blood Group</button>
        </form>
    </div>

    <script>
        const fileInput = document.getElementById('file-upload');
        const fileNameDisplay = document.getElementById('file-name');

        fileInput.addEventListener('change', function () {
            const fileName = this.files[0]?.name;
            if (fileName) {
                fileNameDisplay.innerHTML = `<span class="file-icon">✅</span> Selected: <strong>${fileName}</strong>`;
            } else {
                fileNameDisplay.innerHTML = `<span class="file-icon">📁</span> No fingerprint selected`;
            }
        });
    </script>
</body>
</html>
